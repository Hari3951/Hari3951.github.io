<!DOCTYPE html>
<html>
<head>
<title>Image Screensaver</title>
<style>
body{
    margin:0;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
    color:white;
    font-family:Arial;
}

img{
    max-width:100%;
    max-height:100%;
    object-fit:contain;
}

#controls{
    position:fixed;
    top:10px;
    left:10px;
    background:rgba(0,0,0,0.6);
    padding:10px;
    border-radius:8px;
}
</style>
</head>

<body>

<div id="controls">
<input type="file" id="files" multiple accept="image/*">
<button onclick="start()">Start Slideshow</button>
<label>Seconds per image:</label>
<input type="number" id="delay" value="3" min="1" style="width:50px">
</div>

<img id="viewer">

<script>
let images=[];
let index=0;
let timer=null;

document.getElementById("files").addEventListener("change",function(e){
    images=[];
    for(let file of e.target.files){
        images.push(URL.createObjectURL(file));
    }
});

function start(){
    if(images.length===0)return;

    let delay=document.getElementById("delay").value*1000;

    document.getElementById("viewer").src=images[0];

    timer=setInterval(()=>{
        index=(index+1)%images.length;
        document.getElementById("viewer").src=images[index];
    },delay);
}
</script>

</body>
</html>
